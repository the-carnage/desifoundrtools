<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Desi Founder Tools logo</title>
  <desc id="logoDesc">A premium dark badge with rising gold bars and a green growth line for startup finance.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="14" x2="108" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B2230"/>
      <stop offset="1" stop-color="#0B1016"/>
    </linearGradient>
    <linearGradient id="frame" x1="16" y1="12" x2="112" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCD980"/>
      <stop offset="0.52" stop-color="#F5A623"/>
      <stop offset="1" stop-color="#C7861A"/>
    </linearGradient>
    <linearGradient id="bars" x1="28" y1="42" x2="85" y2="97" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD37A"/>
      <stop offset="0.45" stop-color="#F5A623"/>
      <stop offset="1" stop-color="#B87916"/>
    </linearGradient>
    <linearGradient id="trend" x1="28" y1="78" x2="102" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#6EE7B7"/>
    </linearGradient>
    <filter id="glow" x="10" y="12" width="108" height="102" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="2.5" result="effect1_foregroundBlur"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#bg)"/>
  <rect x="10" y="10" width="108" height="108" rx="28" stroke="url(#frame)" stroke-width="4"/>

  <path d="M28 92H100" stroke="#243040" stroke-width="3" stroke-linecap="round"/>
  <path d="M28 74H100" stroke="#1D2632" stroke-width="2" stroke-linecap="round"/>
  <path d="M28 56H100" stroke="#1A232D" stroke-width="2" stroke-linecap="round"/>

  <rect x="30" y="72" width="13" height="20" rx="4" fill="url(#bars)"/>
  <rect x="49" y="60" width="13" height="32" rx="4" fill="url(#bars)"/>
  <rect x="68" y="47" width="13" height="45" rx="4" fill="url(#bars)"/>
  <rect x="87" y="34" width="13" height="58" rx="4" fill="url(#bars)"/>

  <g filter="url(#glow)">
    <path d="M31 79C40 73 48 65 57 63C67 61 74 63 81 55C87 48 92 41 98 32" stroke="url(#trend)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M90 31H101V42" stroke="url(#trend)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <circle cx="98" cy="31" r="4" fill="#6EE7B7"/>
  <path d="M24 24C31 18 40 16 48 18" stroke="#FCD980" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
</svg>
